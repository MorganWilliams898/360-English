                                <span class="w-7 h-7 md:w-8 md:h-8 bg-orange-100 text-orange-600 rounded-full flex items-center justify-center text-sm font-bold flex-shrink-0">${idx + 1}</span>
                                <h4 class="font-bold text-slate-800 text-sm md:text-base">${sent.structure}</h4>
                                <span class="text-xs text-slate-400 ml-auto whitespace-nowrap"><i class="fas fa-clock mr-1"></i>${sent.time}</span>
                            </div>
                            <p class="text-slate-500 text-xs md:text-sm ml-10 md:ml-11">${sent.meaning}</p>
                        </div>
                        <div class="p-4 md:p-5">
                            <div class="mb-4 p-3 md:p-4 bg-orange-50 border-l-4 border-orange-500 rounded-r-lg">
                                <p class="text-base md:text-lg font-medium text-slate-800 mb-1">"${sent.original}"</p>
                                <button onclick="speak('${sent.original.replace(/'/g, "\\'")}')" class="text-xs text-orange-600 hover:text-orange-700 flex items-center gap-1 mt-2">
                                    <i class="fas fa-play-circle"></i> 播放原句
                                </button>
                            </div>
                            
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
                                <div class="p-3 bg-blue-50 rounded-lg border border-blue-100">
                                    <div class="text-xs text-blue-600 font-bold mb-1">基础版</div>
                                    <div class="text-sm text-slate-700">${sent.basic}</div>
                                </div>
                                <div class="p-3 bg-purple-50 rounded-lg border border-purple-100">
                                    <div class="text-xs text-purple-600 font-bold mb-1">进阶版</div>
                                    <div class="text-sm text-slate-700">${sent.advanced}</div>
                                </div>
                                <div class="p-3 bg-orange-50 rounded-lg border border-orange-100">
                                    <div class="text-xs text-orange-600 font-bold mb-1">高阶版</div>
                                    <div class="text-sm text-slate-700">${sent.high}</div>
                                </div>
                            </div>
                            
                            <div class="flex items-start gap-2 text-sm bg-red-50 p-3 rounded-lg border border-red-100">
                                <i class="fas fa-exclamation-triangle text-red-500 mt-0.5 flex-shrink-0"></i>
                                <div class="text-xs md:text-sm">
                                    <span class="font-bold text-red-700">常见错误：</span>
                                    <span class="text-red-600 line-through">${sent.mistake}</span>
                                    <i class="fas fa-arrow-right mx-1 text-slate-400"></i>
                                    <span class="text-green-600 font-medium">${sent.correct}</span>
                                </div>
                            </div>
                            
                            <div class="mt-4 flex flex-wrap gap-4 pt-4 border-t border-slate-100">
                                <label class="flex items-center gap-2 text-sm text-slate-600 cursor-pointer hover:text-orange-600 transition">
                                    <input type="checkbox" class="rounded text-orange-500 focus:ring-orange-500 w-4 h-4"> 听写练习
                                </label>
                                <label class="flex items-center gap-2 text-sm text-slate-600 cursor-pointer hover:text-orange-600 transition">
                                    <input type="checkbox" class="rounded text-orange-500 focus:ring-orange-500 w-4 h-4"> 造句练习
                                </label>
                                <label class="flex items-center gap-2 text-sm text-slate-600 cursor-pointer hover:text-orange-600 transition">
                                    <input type="checkbox" class="rounded text-orange-500 focus:ring-orange-500 w-4 h-4"> 场景替换
                                </label>
                            </div>
                        </div>
                    </div>
                `).join('')}
            </div>`;
        }

        function renderDictation(dictation) {
            const renderLevel = (items, level) => {
                return items.map((item, idx) => `
                    <div class="flex items-start gap-3 md:gap-4 p-3 md:p-4 bg-slate-50 rounded-xl border border-slate-200 hover:border-orange-300 transition">
                        <span class="flex-shrink-0 w-6 h-6 bg-white border border-slate-300 rounded-full flex items-center justify-center text-xs font-bold text-slate-500">${idx + 1}</span>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2 flex-wrap text-base md:text-lg">
                                <span class="text-slate-800">${item.text}</span>
                                <input type="text" 
                                       class="dictation-input w-24 md:w-32" 
                                       data-answer="${item.answer.toLowerCase()}"
                                       placeholder="${'·'.repeat(Math.min(item.answer.length, 8))}"
                                       autocomplete="off">
                                <button onclick="speak('${item.answer}')" class="text-slate-400 hover:text-orange-500 transition ml-1">
                                    <i class="fas fa-volume-up"></i>
                                </button>
                            </div>
                            <div class="check-result mt-2 hidden">
                                <span class="correct-answer text-green-600 text-sm font-medium hidden">
                                    <i class="fas fa-check-circle mr-1"></i>正确！
                                </span>
                                <span class="wrong-answer text-red-600 text-sm hidden">
                                    <i class="fas fa-times-circle mr-1"></i>正确答案：<span class="font-bold">${item.answer}</span>
                                    <span class="text-slate-500 ml-2 text-xs">(${item.hint})</span>
                                </span>
                            </div>
                        </div>
                    </div>
                `).join('');
            };
            
            return `
                <div class="space-y-6">
                    <div class="flex gap-2 bg-slate-100 p-1 rounded-lg w-fit">
                        <button onclick="switchDictation('basic')" class="dictation-tab px-3 md:px-4 py-2 rounded-md text-sm font-medium bg-white text-orange-600 shadow-sm transition" data-level="basic">基础版</button>
                        <button onclick="switchDictation('advanced')" class="dictation-tab px-3 md:px-4 py-2 rounded-md text-sm font-medium text-slate-600 hover:text-slate-900 transition" data-level="advanced">进阶版</button>
                        <button onclick="switchDictation('challenge')" class="dictation-tab px-3 md:px-4 py-2 rounded-md text-sm font-medium text-slate-600 hover:text-slate-900 transition" data-level="challenge">挑战版</button>
                    </div>
                    
                    <div id="dictation-basic" class="dictation-content space-y-3">
                        ${renderLevel(dictation.basic, 'basic')}
                    </div>
                    
                    <div id="dictation-advanced" class="dictation-content hidden space-y-3">
                        ${renderLevel(dictation.advanced, 'advanced')}
                    </div>
                    
                    <div id="dictation-challenge" class="dictation-content hidden space-y-3">
                        ${renderLevel(dictation.challenge, 'challenge')}
                    </div>
                    
                    <div class="flex flex-col sm:flex-row gap-3 pt-4 border-t border-slate-200">
                        <button onclick="checkAnswers()" class="flex-1 bg-orange-500 hover:bg-orange-600 text-white py-3 rounded-lg font-medium transition shadow-md shadow-orange-200">
                            <i class="fas fa-check-circle mr-2"></i>检查答案
                        </button>
                        <button onclick="showAnswers()" class="px-6 py-3 border border-slate-300 rounded-lg hover:bg-slate-50 transition text-slate-700">
                            <i class="fas fa-eye mr-2"></i>查看答案
                        </button>
                        <button onclick="resetDictation()" class="px-6 py-3 border border-slate-300 rounded-lg hover:bg-slate-50 transition text-slate-700">
                            <i class="fas fa-redo mr-2"></i>重置
                        </button>
                    </div>
                </div>
            `;
        }

        function toggleSection(id) {
            const content = document.getElementById(id);
            const icon = document.getElementById(`icon-${id}`);
            
            if (!content || !icon) return;
            
            if (expandedSections.has(id)) {
                expandedSections.delete(id);
                content.classList.remove('expanded');
                content.style.maxHeight = '0';
                icon.style.transform = 'rotate(0deg)';
            } else {
                expandedSections.add(id);
                content.classList.add('expanded');
                content.style.maxHeight = content.scrollHeight + 'px';
                icon.style.transform = 'rotate(180deg)';
            }
        }

        function playAudio(src, speed, btn) {
            const audio = document.getElementById('mainAudio');
            if (!audio) return;
            
            document.querySelectorAll('.speed-btn').forEach(b => {
                b.classList.remove('border-orange-500', 'bg-orange-50', 'ring-2', 'ring-orange-200');
                b.classList.add('border-slate-200');
                const textDiv = b.querySelector('div:first-child');
                if (textDiv) {
                    textDiv.classList.remove('text-orange-600');
                    textDiv.classList.add('text-slate-700');
                }
            });
            
            btn.classList.remove('border-slate-200');
            btn.classList.add('border-orange-500', 'bg-orange-50', 'ring-2', 'ring-orange-200');
            const btnText = btn.querySelector('div:first-child');
            if (btnText) {
                btnText.classList.remove('text-slate-700');
                btnText.classList.add('text-orange-600');
            }
            
            if (audio.src !== src || audio.paused) {
                audio.src = src;
                audio.playbackRate = speed;
                audio.play();
                const status = document.getElementById('audioStatus');
                if (status) status.textContent = '正在播放 ${speed}x';
            } else {
                audio.pause();
                const status = document.getElementById('audioStatus');
                if (status) status.textContent = '已暂停';
            }
        }

        function showWave() { 
            const wave = document.getElementById('audioWave');
            if (wave) wave.style.opacity = '1'; 
        }
        
        function hideWave() { 
            const wave = document.getElementById('audioWave');
            if (wave) wave.style.opacity = '0'; 
        }

        function switchDictation(level) {
            document.querySelectorAll('.dictation-tab').forEach(tab => {
                if (tab.dataset.level === level) {
                    tab.classList.add('bg-white', 'text-orange-600', 'shadow-sm');
                    tab.classList.remove('text-slate-600');
                } else {
                    tab.classList.remove('bg-white', 'text-orange-600', 'shadow-sm');
                    tab.classList.add('text-slate-600');
                }
            });
            
            document.querySelectorAll('.dictation-content').forEach(content => {
                content.classList.add('hidden');
            });
            
            const target = document.getElementById(`dictation-${level}`);
            if (target) target.classList.remove('hidden');
        }

        function checkAnswers() {
            document.querySelectorAll('.dictation-input').forEach(input => {
                const answer = input.dataset.answer;
                const value = input.value.trim().toLowerCase();
                const resultDiv = input.closest('.flex-1')?.querySelector('.check-result');
                if (!resultDiv) return;
                
                const correctSpan = resultDiv.querySelector('.correct-answer');
                const wrongSpan = resultDiv.querySelector('.wrong-answer');
                
                resultDiv.classList.remove('hidden');
                
                if (value === answer) {
                    input.classList.add('correct');
                    input.classList.remove('wrong');
                    if (correctSpan) correctSpan.classList.remove('hidden');
                    if (wrongSpan) wrongSpan.classList.add('hidden');
                } else {
                    input.classList.add('wrong');
                    input.classList.remove('correct');
                    if (correctSpan) correctSpan.classList.add('hidden');
                    if (wrongSpan) wrongSpan.classList.remove('hidden');
                }
            });
        }

        function showAnswers() {
            document.querySelectorAll('.dictation-input').forEach(input => {
                input.value = input.dataset.answer;
                input.classList.add('correct');
                input.classList.remove('wrong');
                const resultDiv = input.closest('.flex-1')?.querySelector('.check-result');
                if (resultDiv) resultDiv.classList.add('hidden');
            });
        }

        function resetDictation() {
            document.querySelectorAll('.dictation-input').forEach(input => {
                input.value = '';
                input.classList.remove('correct', 'wrong');
                const resultDiv = input.closest('.flex-1')?.querySelector('.check-result');
                if (resultDiv) resultDiv.classList.add('hidden');
            });
        }

        function highlightVocabInText(text) {
            if (!text) return '';
            const vocabMap = {
                'bandwidth': 'word-ielts-core',
                'capacity': 'word-ielts-core',
                'knock out': 'word-work',
                'fixation': 'word-ielts-adv',
                'palette': 'word-ielts-adv',
                'acquire': 'word-ielts-core',
                'overwhelmed': 'word-ielts-core',
                'stagnant': 'word-ielts-adv',
                'fruition': 'word-ielts-adv',
                'therapeutic': 'word-ielts-adv',
                'vanilla': 'word-daily',
                'zucchini': 'word-daily',
                'leftovers': 'word-daily',
                'gonna': 'word-work',
                'off the hook': 'word-work',
                'throw on': 'word-work',
                'good morning': 'word-daily',
                'woke up': 'word-work',
                'get coffee': 'word-daily',
                'behind the scenes': 'word-ielts-core',
                'ups and downs': 'word-work',
                'turns out': 'word-ielts-core',
                'on my own': 'word-work'
            };
            
            let result = text;
            Object.keys(vocabMap).forEach(word => {
                const regex = new RegExp(`\\\\b${word}\\\\b`, 'gi');
                result = result.replace(regex, `<span class="${vocabMap[word]}">$&</span>`);
            });
            return result;
        }

        function highlightVocabInChinese(text) {
            if (!text) return '';
            return text
                .replace(/🔵/g, '<span class="inline-block w-2 h-2 rounded-full bg-blue-500 mr-1"></span><span class="text-blue-600 font-semibold">')
                .replace(/🟣/g, '<span class="inline-block w-2 h-2 rounded-full bg-purple-500 mr-1"></span><span class="text-purple-600 font-semibold">')
                .replace(/🟠/g, '<span class="inline-block w-2 h-2 rounded-full bg-orange-500 mr-1"></span><span class="text-orange-600 font-semibold">')
                .replace(/🟢/g, '<span class="inline-block w-2 h-2 rounded-full bg-green-500 mr-1"></span><span class="text-green-600 font-semibold">')
                .replace(/🔷/g, '<span class="inline-block w-2 h-2 rounded-full bg-cyan-500 mr-1"></span><span class="text-cyan-600 font-semibold">');
        }

        function speak(text) {
            if (!text) return;
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.9;
                speechSynthesis.speak(utterance);
            } else {
                alert('您的浏览器不支持语音朗读功能');
            }
        }

        function playVideo() {
            const video = document.querySelector('#section-video video');
            if (video) video.play();
        }

        function previousCourse() {
            const currentNum = parseInt(currentCourseId.replace('P', ''));
            if (currentNum > 1) {
                const prevId = 'P' + String(currentNum - 1).padStart(3, '0');
                loadCourse(prevId);
            }
        }

        function nextCourse() {
            const currentNum = parseInt(currentCourseId.replace('P', ''));
            if (currentNum < 365) {
                const nextId = 'P' + String(currentNum + 1).padStart(3, '0');
                loadCourse(nextId);
            }
        }

        function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.querySelector('.mobile-overlay');
            
            if (sidebar && overlay) {
                if (sidebar.classList.contains('-translate-x-full')) {
                    sidebar.classList.remove('-translate-x-full');
                    overlay.classList.remove('hidden');
                } else {
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
            }
        }
    </script>
</body>
</html>
